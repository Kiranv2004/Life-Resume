services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    env_file: .env
    depends_on:
      - mongo
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    env_file: .env
    depends_on:
      - mongo
    command: celery -A app.core.celery_app.celery_app worker -Q analysis -l info

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
